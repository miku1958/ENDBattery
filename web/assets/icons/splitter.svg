<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="三分分流器">
  <title>三分分流器</title>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#2563eb"/>
    </marker>
  </defs>
  <!-- input belt -->
  <line x1="6" y1="32" x2="22" y2="32" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
  <!-- three output belts fanning out -->
  <g fill="none" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round" marker-end="url(#ah)">
    <path d="M36 32 L52 14"/>
    <path d="M36 32 L54 32"/>
    <path d="M36 32 L52 50"/>
  </g>
  <!-- splitter body -->
  <rect x="22" y="22" width="14" height="20" rx="4" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
</svg>
