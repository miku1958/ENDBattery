<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="转弯传送带">
  <title>转弯传送带</title>
  <!-- L-shaped belt track: enters from left, turns up -->
  <path d="M6 40 H28 A16 16 0 0 0 44 24 V6" fill="none" stroke="#475569" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M6 40 H28 A16 16 0 0 0 44 24 V6" fill="none" stroke="#e5e7eb" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- direction chevrons following the curve -->
  <g fill="none" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 35 L22 41 L16 47"/>
    <path d="M38 22 L44 14 L50 22"/>
  </g>
</svg>
