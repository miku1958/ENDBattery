<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>终末地电力优化计算器</title>
	<style>
		:root { color-scheme: light dark; }
		body {
			font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
			max-width: 820px;
			margin: 0 auto;
			padding: 1.5rem 1rem 4rem;
			line-height: 1.5;
		}
		h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
		.hint { color: #888; margin-top: 0; }
		fieldset { border: 1px solid #ccc; border-radius: 8px; margin: 0 0 1rem; padding: 0.75rem 1rem 1rem; }
		legend { font-weight: 600; padding: 0 0.4rem; }
		label { display: block; margin: 0.5rem 0; }
		label > span { display: inline-block; }
		input[type="text"], input[type="number"], select { font: inherit; padding: 0.3rem 0.4rem; }
		input[type="text"], input[type="number"] { width: 14rem; max-width: 100%; }
		.configs { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
		.configs select { min-width: 12rem; }
		.static-row { display: flex; gap: 0.5rem; align-items: center; margin: 0.4rem 0; flex-wrap: wrap; }
		.static-row input[type="number"] { width: 9rem; }
		.options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr)); gap: 0.25rem 1rem; }
		.option { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin: 0.3rem 0; }
		.option > span { flex: 1; }
		.option input[type="number"] { width: 8rem; }
		button { font: inherit; padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; }
		#btn-calc { font-size: 1.05rem; padding: 0.5rem 1.4rem; margin-right: 0.75rem; }
		#status { color: #888; }
		h2 { font-size: 1.15rem; margin-top: 1.5rem; }
		pre {
			background: rgba(127, 127, 127, 0.12);
			padding: 1rem;
			border-radius: 8px;
			overflow-x: auto;
			white-space: pre;
			font-family: "SF Mono", "Menlo", "Consolas", monospace;
			font-size: 0.85rem;
			line-height: 1.45;
		}
		pre.err { color: #c0392b; }
		pre.err:empty { display: none; }
		details summary { cursor: pointer; font-weight: 600; margin-bottom: 0.5rem; }
	</style>
</head>
<body>
	<h1>终末地电力优化计算器</h1>
	<p class="hint">填入场景参数,点「开始计算」。配置可命名保存在本地浏览器,随时切换。</p>

	<section class="configs">
		<label style="margin:0;">已存配置
			<select id="config-select"></select>
		</label>
		<button id="btn-new" type="button">新建</button>
		<button id="btn-save" type="button">保存</button>
		<button id="btn-delete" type="button">删除</button>
	</section>

	<form id="calc-form">
		<fieldset>
			<legend>场景</legend>
			<label>配置名称
				<input id="f-name" type="text" required>
			</label>
			<label>基础需求功率
				<input id="f-power" type="number" step="any" required>
			</label>
		</fieldset>

		<fieldset>
			<legend>固定电池</legend>
			<div id="static-rows"></div>
			<button id="btn-add-static" type="button">添加固定电池</button>
		</fieldset>

		<fieldset>
			<legend>分流电池</legend>
			<label>分流电池类型
				<select id="f-analyzed"></select>
			</label>
		</fieldset>

		<details>
			<summary>高级选项</summary>
			<div id="options-grid" class="options-grid"></div>
		</details>

		<p>
			<button id="btn-calc" type="submit">开始计算</button>
			<span id="status"></span>
		</p>
	</form>

	<section>
		<h2>结果</h2>
		<pre id="result"></pre>
		<pre id="stderr" class="err"></pre>
	</section>

	<script type="module" src="app.js"></script>
</body>
</html>
